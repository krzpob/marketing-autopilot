services:

  # ── Kafka (KRaft — bez Zookeeper) ──────────────────────────────
  kafka:
    image: apache/kafka:4.2.1
    container_name: autopilot-kafka
    hostname: kafka
    ports:
      - "9092:9092"        # external (aplikacja)
      - "9094:9094"        # external host (narzędzia deweloperskie)
    environment:
      # KRaft — tryb standalone, bez Zookeeper
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      # Trzy listenery:
      # INTERNAL  — komunikacja między kontenerami (kafka:9092)
      # CONTROLLER — KRaft controller (kafka:9093, nie eksponujemy)
      # EXTERNAL  — dostęp z hosta (localhost:9094)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Wymagane dla single-node — domyślnie RF=3, na jednym nodzie = błąd
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: "168"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"

      # Stały Cluster ID — wymagany przez apache/kafka (bitnami generował sam)
      # Wygeneruj własny: openssl rand -base64 16 | tr -d '=' | head -c 22
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg

    volumes:
      - kafka_data:/var/lib/kafka/data    # inna ścieżka niż bitnami (/bitnami/kafka)
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s                  # apache startuje wolniej niż bitnami

  kafka-init:
    image: apache/kafka:4.2.1            # ten sam obraz co broker
    container_name: autopilot-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    volumes:
      - ./kafka/init-topics.sh:/init-topics.sh:ro
    restart: "no"

  # ── PostgreSQL + pgvector ───────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: autopilot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: marketing_autopilot
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err_postgres_password_required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d marketing_autopilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=64MB

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: autopilot-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?err_redis_password_required}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ─────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: autopilot-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-app}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?err_mongo_password_required}
      MONGO_INITDB_DATABASE: autopilot_agents
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
  data-collector:
    container_name: autopilot-data-collector
    image: data-collector:latest
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      REDIS_PASSWORD:          ${REDIS_PASSWORD:?err_redis_password_required}
      REDIS_HOST:              ${REDIS_HOST:-autopilot-redis}
      REDIS_PORT:              ${REDIS_PORT:-6379}
      REDIS_DB:                ${REDIS_DB:-0}
      META_APP_ID:              ${META_APP_ID}
      META_APP_SECRET:          ${META_APP_SECRET}
      INSTAGRAM_REDIRECT_URI:   ${INSTAGRAM_REDIRECT_URI}
      POSTGRES_URL:            jdbc:postgresql://autopilot-postgres:5432/marketing_autopilot
      POSTGRES_USER:            ${POSTGRES_USER:-autopilot}
      POSTGRES_PASSWORD:        ${POSTGRES_PASSWORD:-autopilot}
      KAFKA_BOOTSTRAP_SERVERS:  kafka:9092

volumes:
  kafka_data:
  postgres_data:
  redis_data:
  mongodb_data:

networks:
  default:
    name: autopilot-network