# Ten plik Docker Compose ładuje AUTOMATYCZNIE obok docker-compose.yml
# Narzędzia deweloperskie — NIE commitować do produkcji

services:

  # Kafka UI — przeglądanie topików, offsetów, wiadomości
  kafka-ui:
    image: kafbat/kafka-ui:main
    container_name: autopilot-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: autopilot-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # pgAdmin — GUI dla PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: autopilot-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@autopilot.pl
      PGADMIN_DEFAULT_PASSWORD: dev
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # RedisInsight — GUI dla Redis
  redisinsight:
    image: redis/redisinsight:latest
    container_name: autopilot-redisinsight
    ports:
      - "5540:5540"

  # Mongo Express — GUI dla MongoDB
  mongo-express:
    image: mongo-express:latest
    container_name: autopilot-mongo-express
    ports:
      - "8091:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-app}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-app}:${MONGO_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  pgadmin_data: