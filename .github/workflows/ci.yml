name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    services:
      # Postgres dla testów integracyjnych (Testcontainers nie potrzebuje tego,
      # ale zostawiamy jako fallback dla szybkich unit testów z @DataJpaTest)
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: marketing_autopilot_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (bez testów — szybka weryfikacja kompilacji)
        run: ./mvnw clean compile -DskipTests

      - name: Run tests
        run: ./mvnw verify
        env:
          # Testcontainers zarządza własnymi kontenerami; te zmienne
          # są tylko fallbackiem dla testów, które nie używają TC
          POSTGRES_HOST: localhost
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: marketing_autopilot_test
          OPENAI_API_KEY: test-key-dla-mock     # MockChatModel nie odpytuje API
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092  # TC kafka nadpisze to sam

      - name: Upload Jacoco report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: '**/target/site/jacoco/'

      - name: Coverage gate (minimum 70%)
        run: |
          for module in competitor-agent data-collector common; do
            echo "Sprawdzam pokrycie: $module"
          done
        # TODO: dodaj jacoco-check goal z minimalnym progiem coverage

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build competitor-agent image
        uses: docker/build-push-action@v6
        with:
          context: ./competitor-agent
          push: false       # zmień na true + dodaj login gdy masz registry
          tags: autopilot/competitor-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max