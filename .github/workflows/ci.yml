name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Upgrade Node.js 20 → 24 (wymagany od 16.06.2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-and-test:
    name: Build & Test (Java 24)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: marketing_autopilot_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'        # zmienione z 21 na 24
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (bez testów)
        run: ./mvnw clean compile -DskipTests --no-transfer-progress

      - name: Run tests
        run: ./mvnw verify --no-transfer-progress
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: marketing_autopilot_test
          OPENAI_API_KEY: test-key-mock
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092

      - name: Upload Jacoco report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: '**/target/site/jacoco/**'   # ** na końcu — fix dla "no files found"
          if-no-files-found: ignore          # nie failuj gdy brak testów

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build competitor-agent image
        uses: docker/build-push-action@v6
        with:
          context: .                                  # root — Dockerfile widzi wszystkie moduły
          file: ./competitor-agent/Dockerfile         # jawna ścieżka do Dockerfile
          push: false
          tags: autopilot/competitor-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max