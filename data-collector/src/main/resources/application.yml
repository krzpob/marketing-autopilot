server:
  port: 8083

spring:
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: data-collector
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/autopilot}
    username: ${POSTGRES_USER:test}
    password: ${POSTGRES_PASSWORD:test}
  # flyway:
  #   enabled: true
  #   locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:  
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  cloud:
    stream:
      bindings:
        competitor-data-out-0:
          destination: competitor-data-events
          content-type: application/json   # TODO: B3 → application/*+avro
        hashtag-data-out-0:
          destination: hashtag-data-events
          content-type: application/json
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      password: ${REDIS_PASSWORD}
instagram:
  api:
    client-id:     ${META_APP_ID}
    client-secret: ${META_APP_SECRET}
    redirect-uri:  ${INSTAGRAM_REDIRECT_URI:http://localhost:8083/oauth/instagram/callback}
    graph-base-url: https://graph.facebook.com/v19.0
    auth-base-url:  https://www.facebook.com/dialog/oauth
    token-base-url: https://graph.facebook.com/v19.0/oauth/access_token
    scopes: instagram_basic,instagram_manage_insights,pages_show_list,pages_read_engagement

facebook:
  api:
    client-id:     ${META_APP_ID}
    client-secret: ${META_APP_SECRET}

google:
  api:
    client-id:     ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}

resilience4j:
  circuitbreaker:
    instances:
      instagramApi:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        record-exceptions:
          - pl.autopilot.datacollector.infrastructure.instagram.client.InstagramApiException
          - org.springframework.web.client.ResourceAccessException
        ignore-exceptions:
          - pl.autopilot.datacollector.infrastructure.instagram.client.InstagramTokenExpiredException

management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers,mappings
  health:
    circuitbreakers:
      enabled: true