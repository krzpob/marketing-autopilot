spring:
  application:
    name: competitor-agent

  # ── DataSource ─────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:?}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:?}
    username: ${POSTGRES_USER:?}
    password: ${POSTGRES_PASSWORD:?}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: CompetitorAgentPool

  # ── JPA ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway zarządza schematem, nie Hibernate
    open-in-view: false
    properties:
      hibernate:
        default_schema: competitor
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true

  # ── Flyway ─────────────────────────────────────────────────────
  flyway:
    enabled: true
    schemas: competitor
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  # ── Kafka ──────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:?}
    consumer:
      group-id: competitor-agent-group
      auto-offset-reset: earliest
      enable-auto-commit: false       # ręczne potwierdzenie po przetworzeniu
      max-poll-records: 10
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        schema.registry.url: ${SCHEMA_REGISTRY_URL:?}
        specific.avro.reader: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        schema.registry.url: ${SCHEMA_REGISTRY_URL:?}
      acks: all                       # pełna gwarancja dostarczenia
      retries: 3

  # ── MongoDB (pamięć agentów) ────────────────────────────────────
  data:
    mongodb:
      uri: mongodb://${MONGO_USER:?}:${MONGO_PASSWORD:?}@${MONGO_HOST:?}:${MONGO_PORT:-27017}/autopilot_agents?authSource=admin

  # ── Virtual Threads (Java 21) ───────────────────────────────────
  threads:
    virtual:
      enabled: true

# ── LangChain4j ────────────────────────────────────────────────────
langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:?}
      model-name: gpt-4o-mini         # tańszy model do analizy tekstowej
      temperature: 0.2                # niskie = bardziej deterministyczne odpowiedzi
      max-tokens: 2000
      timeout: 60s
      log-requests: false
      log-responses: false

# ── Actuator + Micrometer ───────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${APP_ENV:-unknown}

# ── Resilience4j — circuit breaker dla LLM ─────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      llm-analysis:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      llm-analysis:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - java.io.IOException
          - dev.langchain4j.exception.HttpException

# ── Własna konfiguracja ─────────────────────────────────────────────
app:
  kafka:
    topics:
      competitor-data-raw: competitor.data.raw
      competitor-insights: competitor.insights.created
      dlq: competitor.data.dlq
  agent:
    analysis-batch-size: 50           # ile postów analizujemy na raz
    max-competitors-per-profile: 10